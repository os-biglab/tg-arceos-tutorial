name: CI

on:
  push:
    branches: [ "main", "dev", "master" ]
  pull_request:
    branches: [ "main", "dev", "master" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    runs-on: ubuntu-latest
    container: ghcr.io/chyyuu/tangram-crates
    steps:
    - uses: actions/checkout@v4
    - name: Run tests
      run: ./scripts/test.sh
